name: AddressGuru AE Backend CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test:
    name: Node Backend Tests
    runs-on: ubuntu-latest

    # ✅ Skip draft PRs safely
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    # ✅ MongoDB Service (IMPORTANT)
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # ✅ Use GitHub Secrets (set in repo settings)
      MONGO_URI: mongodb://localhost:27017/testdb
      JWT_SECRET: testsecret
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        run: |
          for i in {1..10}; do
            nc -z localhost 27017 && echo "MongoDB is up!" && exit 0
            echo "Waiting for MongoDB..."
            sleep 2
          done
          echo "MongoDB failed to start"
          exit 1

      - name: Run linter
        run: npm run lint || echo "No lint script"

      - name: Run tests
        run: npm test -- --detectOpenHandles --forceExit
